<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushin UI</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg-hardware: #121212;
            --text-main: #e0e0e0;
            --panel-border: #2a2a2a;
            --marking: rgba(255, 255, 255, 0.15);
            --display-bg: #080808;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-hardware);
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0d0d0d 100%);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'Segoe UI', monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        .faceplate-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .main-panel {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 950px;
            height: 85%;
            background: #111;
            border: 2px solid var(--panel-border);
            border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            padding: 30px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .screw {
            position: absolute;
            width: 14px;
            height: 14px;
            background: radial-gradient(circle at 30% 30%, #444, #000);
            border-radius: 50%;
            border: 1px solid #222;
        }
        .tl { top: 12px; left: 12px; }
        .tr { top: 12px; right: 12px; }
        .bl { bottom: 12px; left: 12px; }
        .br { bottom: 12px; right: 12px; }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--marking);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .title {
            font-size: 2rem;
            font-weight: 100;
            letter-spacing: 0.5em;
            color: #fff;
        }

        .model-no {
            font-size: 0.7rem;
            opacity: 0.5;
            letter-spacing: 0.1em;
        }

        .top-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            flex: 2; /* Occupies 2/3 roughly */
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 15px 5px;
            border: 1px solid rgba(255,255,255,0.03);
            background: rgba(255,255,255,0.01);
        }

        .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--primary);
            margin-bottom: 15px;
            font-weight: bold;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 80%;
            height: 200px;
            background: transparent;
            writing-mode: bt-rl; /* Vertical slider support attempt */
            appearance: slider-vertical;
        }

        /* Fallback Horizontal Sliders if vertical doesn't play nice */
        .horizontal-slider {
            width: 100% !important;
            height: auto !important;
            writing-mode: initial !important;
            appearance: auto !important;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 2px;
            background: var(--marking);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 30px;
            background: #222;
            border: 1px solid #444;
            border-radius: 1px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            cursor: pointer;
        }

        .value {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: 400;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .bottom-section {
            flex: 1; /* Occupies 1/3 */
            margin-top: 20px;
            position: relative;
            background: var(--display-bg);
            border: 1px solid #222;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .display-label {
            position: absolute;
            top: 5px;
            left: 10px;
            font-size: 0.5rem;
            color: rgba(255,255,255,0.2);
            z-index: 2;
        }

        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <svg class="faceplate-bg" viewBox="0 0 1000 666" preserveAspectRatio="none">
        <defs>
            <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
                <circle cx="1" cy="1" r="0.5" fill="rgba(255,255,255,0.05)" />
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#dots)" />
        <path d="M 0 33% L 1000 33% M 0 66% L 1000 66%" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
    </svg>

    <div class="main-panel">
        <div class="screw tl"></div><div class="screw tr"></div>
        <div class="screw bl"></div><div class="screw br"></div>

        <div class="header-area">
            <div class="title">MUSHIN</div>
            <div class="model-no">MOD-01 // SIGNAL CORRUPTOR</div>
        </div>

        <div class="top-section">
            <div class="control-group">
                <div class="label">Drive</div>
                <input type="range" id="drive" class="horizontal-slider" min="0" max="1" step="0.001">
                <div class="value" id="drive-val">1.0</div>
            </div>

            <div class="control-group">
                <div class="label">Threshold</div>
                <input type="range" id="threshold" class="horizontal-slider" min="0" max="1" step="0.001">
                <div class="value" id="threshold-val">1.00</div>
            </div>

            <div class="control-group">
                <div class="label">Output</div>
                <input type="range" id="gain" class="horizontal-slider" min="0" max="1" step="0.001">
                <div class="value" id="gain-val">1.00</div>
            </div>

            <div class="control-group">
                <div class="label">Exhaustion</div>
                <input type="checkbox" id="exhaustion" style="transform: scale(1.5);">
                <div class="value" id="exhaustion-val">OFF</div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="display-label">OSCILLOSCOPE // MONO_SUM</div>
            <canvas id="waveformCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveformCanvas');
        const ctx = canvas.getContext('2d');
        let audioData = new Float32Array(256);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            requestAnimationFrame(draw);
            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw scanlines
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            for(let i=0; i<canvas.height; i+=4) ctx.fillRect(0, i, canvas.width, 1);

            ctx.beginPath();
            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0, 210, 255, 0.8)';
            
            const sliceWidth = canvas.width / (audioData.length - 1);
            let x = 0;
            for (let i = 0; i < audioData.length; i++) {
                const y = (audioData[i] * 0.4 + 0.5) * canvas.height;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        draw();

        if (window.__JUCE__ && window.__JUCE__.backend) {
            window.__JUCE__.backend.addEventListener('waveform', (data) => {
                audioData = new Float32Array(data);
            });
        }

        const params = {
            gain: { min: 0, max: 2, display: v => v.toFixed(2) },
            drive: { min: 1, max: 10, display: v => v.toFixed(1) },
            threshold: { min: 0, max: 1, display: v => v.toFixed(2) },
            exhaustion: { type: 'bool', display: v => v > 0.5 ? 'ON' : 'OFF' }
        };

        function updateParam(id, normalizedValue) {
            if (window.__JUCE__ && window.__JUCE__.backend) {
                window.__JUCE__.backend.callNativeFunction('setParameterValue', [id, normalizedValue]);
            }
        }

        ['gain', 'drive', 'threshold'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => updateParam(id, parseFloat(e.target.value)));
        });
        document.getElementById('exhaustion').addEventListener('change', (e) => updateParam('exhaustion', e.target.checked ? 1.0 : 0.0));

        window.setParameterValue = (id, val) => {
            const config = params[id];
            if (!config) return;
            const el = document.getElementById(id);
            if (config.type === 'bool') el.checked = val > 0.5;
            else el.value = val;
            document.getElementById(id + '-val').textContent = config.display(
                config.type === 'bool' ? val : (config.min + (config.max - config.min) * val)
            );
        };
    </script>
</body>
</html>
