<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushin UI</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg-hardware: #121212;
            --text-main: #e0e0e0;
            --panel-border: #2a2a2a;
            --marking: rgba(255, 255, 255, 0.15);
            --display-bg: #080808;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-hardware);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'Segoe UI', monospace;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .main-panel {
            position: relative;
            width: 90%; max-width: 950px; height: 85%;
            background: #111;
            border: 2px solid var(--panel-border);
            border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            padding: 30px; box-sizing: border-box;
        }

        .header-area {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--marking);
            margin-bottom: 20px; padding-bottom: 10px;
        }

        .title { font-size: 2rem; font-weight: 100; letter-spacing: 0.5em; color: #fff; }

        .top-section {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 20px; flex: 2; align-items: center;
        }

        .control-group {
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 5px; border: 1px solid rgba(255,255,255,0.03);
        }

        .label { font-size: 0.65rem; text-transform: uppercase; color: var(--primary); margin-bottom: 15px; }

        input[type=range] { width: 80%; cursor: pointer; }

        .value { margin-top: 15px; font-size: 1.1rem; color: #fff; }

        .bottom-section {
            flex: 1; margin-top: 20px; position: relative;
            background: var(--display-bg); border: 1px solid #222;
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div class="main-panel">
        <div class="header-area">
            <div class="title">MUSHIN</div>
            <div style="font-size:0.7rem; opacity:0.5;">HYBRID_BRIDGE_V1</div>
        </div>

        <div class="top-section">
            <div class="control-group">
                <div class="label">Drive</div>
                <input type="range" id="drive" min="0" max="1" step="0.001">
                <div class="value" id="drive-val">1.0</div>
            </div>
            <div class="control-group">
                <div class="label">Threshold</div>
                <input type="range" id="threshold" min="0" max="1" step="0.001">
                <div class="value" id="threshold-val">1.00</div>
            </div>
            <div class="control-group">
                <div class="label">Output</div>
                <input type="range" id="gain" min="0" max="1" step="0.001">
                <div class="value" id="gain-val">1.00</div>
            </div>
            <div class="control-group">
                <div class="label">Exhaustion</div>
                <input type="checkbox" id="exhaustion">
                <div class="value" id="exhaustion-val">OFF</div>
            </div>
        </div>

        <div class="bottom-section">
            <canvas id="waveformCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveformCanvas');
        const ctx = canvas.getContext('2d');
        let audioData = new Float32Array(256);

        function draw() {
            requestAnimationFrame(draw);
            ctx.fillStyle = '#080808';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 2;
            const sliceWidth = canvas.width / (audioData.length - 1);
            let x = 0;
            for (let i = 0; i < audioData.length; i++) {
                const y = (audioData[i] * 0.4 + 0.5) * canvas.height;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.stroke();
        }
        draw();

        let backend = null;
        async function init() {
            const juceObj = window.juce || window.__JUCE__;
            if (juceObj) {
                backend = juceObj.getBackend ? await juceObj.getBackend() : (juceObj.backend || juceObj);
                if (backend && backend.addEventListener) {
                    backend.addEventListener('waveform', data => audioData = new Float32Array(data));
                }
            }
        }

        const params = {
            gain: { min: 0, max: 2, display: v => v.toFixed(2) },
            drive: { min: 1, max: 10, display: v => v.toFixed(1) },
            threshold: { min: 0, max: 1, display: v => v.toFixed(2) },
            exhaustion: { type: 'bool', display: v => v > 0.5 ? 'ON' : 'OFF' }
        };

        function updateParam(id, val) {
            const config = params[id];
            const displayVal = config.type === 'bool' ? val : (config.min + (config.max - config.min) * val);
            document.getElementById(id + '-val').textContent = config.display(displayVal);
            
            // HYBRID CALL
            // 1. Official
            if (backend && backend.setParameterValue) {
                backend.setParameterValue(id, val);
            }
            // 2. URL Fallback (Garanteed)
            window.location.href = "mushin://setParameterValue?id=" + id + "&val=" + val;
        }

        ['gain', 'drive', 'threshold'].forEach(id => {
            document.getElementById(id).addEventListener('input', e => updateParam(id, parseFloat(e.target.value)));
        });
        document.getElementById('exhaustion').addEventListener('change', e => updateParam('exhaustion', e.target.checked ? 1.0 : 0.0));

        window.setParameterValue = (id, val) => {
            const config = params[id]; if (!config) return;
            const el = document.getElementById(id);
            if (config.type === 'bool') el.checked = val > 0.5; else el.value = val;
            const displayVal = config.type === 'bool' ? val : (config.min + (config.max - config.min) * val);
            document.getElementById(id + '-val').textContent = config.display(displayVal);
        };

        setTimeout(init, 1000);
    </script>
</body>
</html>
