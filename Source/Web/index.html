<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushin UI</title>
    <style>
        :root {
            --primary: #00d2ff;
            --bg-dark: #0d0d0d;
            --bg-light: #1a1a1a;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(0, 210, 255, 0.07) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 210, 255, 0.07) 0%, transparent 40%),
                linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20px;
        }

        /* Subtle Grid Pattern Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(ellipse at center, black, transparent 80%);
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 1;
            margin-bottom: 20px;
            letter-spacing: 0.6em;
            font-weight: 200;
            font-size: 2.8rem;
            opacity: 0.95;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        .container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid var(--border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), 
                        inset 0 0 20px rgba(255,255,255,0.02);
            width: 95%;
            max-width: 850px;
        }

        .control-group {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .knob-label {
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: var(--primary);
            opacity: 0.8;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            max-width: 220px;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 26px;
            width: 26px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -11px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            border: 2px solid var(--bg-dark);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.15);
            background: var(--primary);
        }

        .value-display {
            margin-top: 12px;
            font-size: 1.4rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            color: rgba(255, 255, 255, 0.9);
        }

        .visualiser-container {
            grid-column: span 2;
            margin-top: 25px;
            width: 100%;
            height: 130px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(0, 210, 255, 0.15);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.08);
            transition: .4s;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .slider-round:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        input:checked + .slider-round { background-color: var(--primary); }
        input:checked + .slider-round:before { transform: translateX(26px); }
    </style>
</head>
<body>
    <div class="header">MUSHIN</div>
    
    <div class="container">
        <div class="control-group">
            <div class="knob-label">Output</div>
            <input type="range" id="gain" min="0" max="1" step="0.001" value="0.5">
            <div class="value-display" id="gain-val">1.00</div>
        </div>

        <div class="control-group">
            <div class="knob-label">Drive</div>
            <input type="range" id="drive" min="0" max="1" step="0.001" value="0">
            <div class="value-display" id="drive-val">1.0</div>
        </div>

        <div class="control-group">
            <div class="knob-label">Threshold</div>
            <input type="range" id="threshold" min="0" max="1" step="0.001" value="1">
            <div class="value-display" id="threshold-val">1.00</div>
        </div>

        <div class="control-group">
            <div class="knob-label">Exhaustion</div>
            <label class="switch">
                <input type="checkbox" id="exhaustion">
                <span class="slider-round"></span>
            </label>
            <div class="value-display" id="exhaustion-val">OFF</div>
        </div>
        
        <div class="visualiser-container">
            <canvas id="waveformCanvas"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveformCanvas');
        const ctx = canvas.getContext('2d');
        let audioData = new Float32Array(256);

        function resizeCanvas() {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function draw() {
            requestAnimationFrame(draw);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw baseline
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.1)';
            ctx.lineWidth = 1;
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            // Draw waveform with glow
            ctx.beginPath();
            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 2.5 * window.devicePixelRatio;
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0, 210, 255, 0.5)';

            const sliceWidth = canvas.width / (audioData.length - 1);
            let x = 0;

            for (let i = 0; i < audioData.length; i++) {
                const v = audioData[i];
                const y = (v * 0.45 + 0.5) * canvas.height;

                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);

                x += sliceWidth;
            }

            ctx.stroke();
            ctx.shadowBlur = 0; // reset for next frame
        }
        requestAnimationFrame(draw);

        if (window.__JUCE__ && window.__JUCE__.backend) {
            window.__JUCE__.backend.addEventListener('waveform', (data) => {
                if (Array.isArray(data)) {
                    audioData = new Float32Array(data);
                }
            });
        }

        const params = {
            gain: { min: 0, max: 2, display: v => v.toFixed(2) },
            drive: { min: 1, max: 10, display: v => v.toFixed(1) },
            threshold: { min: 0, max: 1, display: v => v.toFixed(2) },
            exhaustion: { type: 'bool', display: v => v > 0.5 ? 'ON' : 'OFF' }
        };

        function updateParam(id, normalizedValue) {
            const config = params[id];
            if (config.type === 'bool') {
                document.getElementById(id).checked = normalizedValue > 0.5;
            } else {
                document.getElementById(id).value = normalizedValue;
            }
            document.getElementById(id + '-val').textContent = config.display(
                config.type === 'bool' ? normalizedValue : (config.min + (config.max - config.min) * normalizedValue)
            );

            if (window.__JUCE__ && window.__JUCE__.backend) {
                window.__JUCE__.backend.callNativeFunction('setParameterValue', [id, normalizedValue]);
            }
        }

        ['gain', 'drive', 'threshold'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                updateParam(id, parseFloat(e.target.value));
            });
        });

        document.getElementById('exhaustion').addEventListener('change', (e) => {
            updateParam('exhaustion', e.target.checked ? 1.0 : 0.0);
        });

        window.setParameterValue = (id, val) => {
            const config = params[id];
            if (!config) return;
            if (config.type === 'bool') document.getElementById(id).checked = val > 0.5;
            else document.getElementById(id).value = val;
            document.getElementById(id + '-val').textContent = config.display(
                config.type === 'bool' ? val : (config.min + (config.max - config.min) * val)
            );
        };
    </script>
</body>
</html>
